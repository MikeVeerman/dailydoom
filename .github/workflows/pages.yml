name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Clean up build artifacts
        run: |
          # Remove Python virtual environments and build artifacts
          rm -rf sprite_env/
          rm -rf __pycache__/
          rm -rf *.pyc
          rm -rf .Python
          rm -rf build/
          rm -rf develop-eggs/
          rm -rf dist/
          rm -rf downloads/
          rm -rf eggs/
          rm -rf .eggs/
          rm -rf lib/
          rm -rf lib64/
          rm -rf parts/
          rm -rf sdist/
          rm -rf var/
          rm -rf wheels/
          rm -rf *.egg-info/
          # Remove large binary files that aren't needed for web deployment
          find . -name "*.b64" -delete
          find . -name "*.tar.gz" -delete
          
      - name: Cache bust assets
        run: |
          # Get short commit SHA for cache busting
          SHORT_SHA=${GITHUB_SHA::7}
          echo "Using cache bust version: $SHORT_SHA"
          
          # Add cache busting to all script and link tags in HTML files
          find . -name "*.html" -type f -exec sed -i "s/\(src=\"[^\"]*\.js\)\"/\1?v=$SHORT_SHA\"/g" {} \;
          find . -name "*.html" -type f -exec sed -i "s/\(href=\"[^\"]*\.css\)\"/\1?v=$SHORT_SHA\"/g" {} \;
          
          # Add no-cache meta tags to HTML head sections
          find . -name "*.html" -type f -exec sed -i 's/<head>/<head>\n    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n    <meta http-equiv="Pragma" content="no-cache">\n    <meta http-equiv="Expires" content="0">/g' {} \;
          
          echo "Cache busting applied to HTML files"
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4