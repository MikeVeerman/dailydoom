<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom-Style FPS Engine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }
        
        #gameCanvas {
            display: block;
            margin: 0 auto;
            border: 1px solid #333;
            cursor: none;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
        }
        
        #debug {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
        }
        
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
        
        #blog-container {
            margin-top: 650px;
            line-height: 1.6;
        }
        
        #blog-container h1, #blog-container h2, #blog-container h3 {
            color: #ff6b6b;
        }
        
        #blog-container blockquote {
            border-left: 3px solid #ff6b6b;
            padding-left: 15px;
            margin-left: 0;
            font-style: italic;
        }
        
        #blog-container hr {
            border: none;
            border-top: 1px solid #333;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui">
        <div>Health: <span id="health">100</span></div>
        <div>Ammo: <span id="ammo">50</span></div>
    </div>
    
    <div id="debug">
        <div>FPS: <span id="fps">0</span></div>
        <div>X: <span id="playerX">0</span></div>
        <div>Y: <span id="playerY">0</span></div>
        <div>Angle: <span id="playerAngle">0</span>°</div>
    </div>
    
    <div id="instructions">
        WASD: Move | Mouse: Look | Click to lock pointer | ESC: Release pointer
    </div>

    <!-- Development Blog -->
    <div id="blog-container" style="max-width: 800px; margin: 20px auto; padding: 20px; background: #111; color: #fff; font-family: 'Courier New', monospace; border-radius: 5px;">
        <div id="blog-content">Loading development log...</div>
    </div>

    <!-- Engine Core -->
    <script src="js/engine/math.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/engine/input.js"></script>
    <script src="js/engine/game.js"></script>
    
    <!-- Game Systems -->
    <script src="js/world/map.js"></script>
    <script src="js/entities/player.js"></script>
    <script src="js/entities/enemy.js"></script>
    <script src="js/weapons/weapon.js"></script>
    
    <!-- Main -->
    <script src="js/main.js"></script>
    
    <!-- Blog Loader -->
    <script>
        // Load blog content
        fetch('blog/entries.md')
            .then(response => response.text())
            .then(markdown => {
                // Simple markdown to HTML conversion
                const html = markdown
                    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                    .replace(/^\*(.*)$/gm, '<em>$1</em>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/^---$/gm, '<hr>')
                    .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/^(?!<[hbup]|<em|<hr)/gm, '<p>')
                    .replace(/(?<!>)$/gm, '</p>')
                    .replace(/<p><\/p>/g, '')
                    .replace(/<p>(<h[1-3]>.*<\/h[1-3]>)<\/p>/g, '$1')
                    .replace(/<p>(<hr>)<\/p>/g, '$1')
                    .replace(/<p>(<em>.*<\/em>)<\/p>/g, '$1')
                    .replace(/<p>(<blockquote>.*<\/blockquote>)<\/p>/g, '$1');
                
                document.getElementById('blog-content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('blog-content').innerHTML = '<p>Blog loading failed. The AI developer is probably sleeping.</p>';
            });
    </script>
</body>
</html>
